<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#05070D" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>InCruiter — Interviews, handled. AI-powered precision hiring</title>
    <meta
      name="description"
      content="InCruiter is augmented AI for precision hiring. Hire 4× faster, cut hiring cost 80%, and get expert interview feedback in as little as 6 hours."
    />
    <link rel="canonical" href="https://incruiter.com/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="InCruiter — Interviews, handled." />
    <meta
      property="og:description"
      content="Augmented AI for precision hiring. 4× faster, 80% cheaper, feedback in 6 hours."
    />
    <meta property="og:image" content="/videos/incruiterblue2-poster.jpg" />
    <meta property="og:url" content="https://incruiter.com/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="InCruiter — Interviews, handled." />
    <meta
      name="twitter:description"
      content="Augmented AI for precision hiring. 4× faster, 80% cheaper, feedback in 6 hours."
    />
    <meta name="twitter:image" content="/videos/incruiterblue2-poster.jpg" />

    <!-- Poster is the LCP element: preload it. Do NOT preload the video. -->
    <link rel="preload" as="image" href="/videos/incruiterblue2-poster.jpg" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "InCruiter",
        "url": "https://incruiter.com",
        "description": "AI-powered interview and hiring platform.",
        "foundingDate": "2018",
        "makesOffer": [
          { "@type": "Offer", "itemOffered": { "@type": "SoftwareApplication", "name": "IncServe", "applicationCategory": "BusinessApplication" } },
          { "@type": "Offer", "itemOffered": { "@type": "SoftwareApplication", "name": "IncBot", "applicationCategory": "BusinessApplication" } },
          { "@type": "Offer", "itemOffered": { "@type": "SoftwareApplication", "name": "IncVid", "applicationCategory": "BusinessApplication" } },
          { "@type": "Offer", "itemOffered": { "@type": "SoftwareApplication", "name": "IncScreen", "applicationCategory": "BusinessApplication" } },
          { "@type": "Offer", "itemOffered": { "@type": "SoftwareApplication", "name": "IncFeed", "applicationCategory": "BusinessApplication" } },
          { "@type": "Offer", "itemOffered": { "@type": "SoftwareApplication", "name": "IncExit", "applicationCategory": "BusinessApplication" } }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
